<!DOCTYPE html>

<html>
<head>
<title>Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
}

header{
background:#1e3a5f;
color:white;
padding:20px;
text-align:center;
}

nav{
background:#14263d;
padding:15px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:15px;
}

.container{
padding:30px;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,.2);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.clock{
text-align:center;
font-size:22px;
margin:20px;
font-weight:bold;
}

</style>

</head>

<body>

<header>
<h1>Dashboard Statistics</h1>
<button onclick="toggleTheme()">Theme</button>
</header>

<nav>
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="reports.html">Reports</a>
<a href="contact.html">Contact</a>
</nav>

<div class="clock" id="clock"></div>

<div class="container">

<div class="dashboard">

<div class="card">
<h3>Total Users</h3>
<p id="users">0</p>
</div>

<div class="card">
<h3>Active Users</h3>
<p id="active">0</p>
</div>

<div class="card">
<h3>Revenue</h3>
<p id="revenue">0</p>
</div>

<div class="card">
<h3>Transactions</h3>
<p id="trans">0</p>
</div>

<div class="card">
<h3>Notifications</h3>
<p id="notify">0</p>
</div>

<div class="card">
<h3>Pending Tasks</h3>
<p id="tasks">0</p>
</div>

</div>

</div>

<script>

function counter(id,target){

let count=0;

let speed=target/100;

let interval=setInterval(()=>{

count+=speed;

document.getElementById(id).innerHTML=Math.floor(count);

if(count>=target){
document.getElementById(id).innerHTML=target;
clearInterval(interval);
}

},20);

}

counter("users",1500);
counter("active",1250);
counter("revenue",300000);
counter("trans",5400);
counter("notify",32);
counter("tasks",18);

setInterval(()=>{
document.getElementById("clock").innerHTML=
new Date().toLocaleString();
},1000);

function toggleTheme(){
document.body.style.background=
document.body.style.background=="black"?
"#f4f6f9":"black";
}

</script>

</body>
</html>
