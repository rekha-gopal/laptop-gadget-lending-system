<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logout</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1e3a5f,#284d7a);
font-family:Arial,sans-serif;
}

.box{
background:white;
padding:50px;
border-radius:15px;
text-align:center;
width:400px;
animation:bounce 2s infinite;
}

@keyframes bounce{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

}

a{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:#1e3a5f;
color:white;
text-decoration:none;
border-radius:8px;
transition:.3s;
}

a:hover{
background:#284d7a;
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="box">

<h1>You Have Logged Out</h1>

<p>
Thank you for using the Laptop and Gadget Lending System.
</p>

<a href="index.html">Return to Home</a>

</div>

</body>
</html>
